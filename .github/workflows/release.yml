name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build release ZIP
        run: |
          rsync -av --exclude-from='.distignore' ./ "wp-linkedin-auto-share/"
          zip -r "wp-linkedin-auto-share-${{ steps.version.outputs.version }}.zip" "wp-linkedin-auto-share/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-linkedin-auto-share-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
